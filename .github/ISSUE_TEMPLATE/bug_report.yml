name: Bug report
description: Something doesn't work as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, what did you expect, what happened instead?
      placeholder: |
        Given …
        When …
        Then I expected … but got …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag, nightly date, or commit SHA.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, runtime/SDK version, anything relevant.
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps — ideally a failing input.
